name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  # Upstream rsync source — bumped in lockstep with the lzsync release.
  RSYNC_VERSION: '3.4.1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: lzsync-linux-x86_64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: lzsync-linux-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: lzsync-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: lzsync-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build lzsync
        run: cargo build --release --target ${{ matrix.target }}

      # Build a minimal rsync from source using the native runner's
      # toolchain. Optional features (xxhash / zstd / lz4 / md2man) are
      # disabled so we don't drag in Homebrew / apt dependencies into the
      # bundled binary; this keeps it a single file that links only against
      # the platform's libc / libSystem.
      - name: Build bundled rsync
        run: |
          set -euxo pipefail
          curl -sSL "https://download.samba.org/pub/rsync/src/rsync-${RSYNC_VERSION}.tar.gz" | tar -xz
          cd "rsync-${RSYNC_VERSION}"
          ./configure \
            --disable-openssl \
            --disable-xxhash \
            --disable-zstd \
            --disable-lz4 \
            --disable-md2man
          make -j"$(getconf _NPROCESSORS_ONLN)"
          file rsync
          ./rsync --version | head -1
          strip rsync || true
          mv rsync ../lzsync-rsync
          cd ..

      - name: Package
        run: |
          set -euxo pipefail
          mkdir -p "dist/${{ matrix.artifact }}"
          cp "target/${{ matrix.target }}/release/lzsync" "dist/${{ matrix.artifact }}/lzsync"
          cp lzsync-rsync "dist/${{ matrix.artifact }}/lzsync-rsync"
          chmod +x "dist/${{ matrix.artifact }}/"*
          tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C dist "${{ matrix.artifact }}"
          ls -la "dist/${{ matrix.artifact }}/"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
