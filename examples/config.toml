# lzsync config.toml example
#
# Place this file at one of:
#   - $PWD/.lzsync/config.toml              (per-project, loaded first)
#   - $XDG_CONFIG_HOME/lzsync/config.toml   (global fallback)

# Target selected automatically on startup. Omit to auto-select the first target.
default_target = "dev"

# auto  — paste / drop immediately triggers sync
# manual — files queue up; press Enter to start
default_mode = "auto"

# remote_path | scp_style | ssh_path | custom
clipboard_format = "remote_path"

# Only used when clipboard_format = "custom".
# Placeholders: {user} {host} {port} {path} {basename}
clipboard_template = "{user}@{host}:{path}"

# Optional — one of: mocha | tokyo_night | gruvbox | nord | dracula
theme = "mocha"

# --- Targets ---------------------------------------------------------------

[[target]]
name        = "dev"
host        = "dev.example.com"
user        = "ubuntu"
remote_dir  = "~/uploads"         # ~ expands to remote $HOME at transfer time
ssh_port    = 22                   # optional, defaults to 22
# ssh_key   = "~/.ssh/id_rsa"      # optional, defaults to ssh-agent / ~/.ssh/id_*
# clipboard_format = "scp_style"   # optional per-target override

[[target]]
name        = "staging"
host        = "staging.example.com"
user        = "deploy"
remote_dir  = "/tmp/uploads"

# --- Groups ----------------------------------------------------------------
# A group is a named bundle of targets. Selecting a group fans out the transfer
# to all its members. `primary` controls which target's path is returned to the
# clipboard after fan-out (defaults to the first).

[[group]]
name     = "all-dev"
targets  = ["dev", "staging"]
primary  = "dev"

# --- Folder watches (v0.4.0+) ----------------------------------------------
# A watch monitors a directory and auto-syncs any new file matching `patterns`
# to `targets`. Useful for screenshot folders: take a screenshot → the remote
# path is on your clipboard ~2s later, no drag-drop needed.
#
# Each watch has its own lock; two lzsync instances can watch different
# folders, but only one can watch a given folder at a time.

# [[watch]]
# name        = "screenshots"
# path        = "~/Desktop"
# targets     = ["dev"]
# patterns    = ["*.png", "*.jpg", "*.jpeg", "*.heic", "*.webp"]
# catchup     = "prompt"   # prompt | auto | ignore  — how to handle files added while lzsync was off
# enabled     = false      # try to acquire the watch lock on launch
# debounce_ms = 500        # wait this long after a new file appears before sending it
# recursive   = false      # watch subdirectories too

# --- Port forwards (v0.6.0+) -----------------------------------------------
# A tunnel is an `ssh -L` forward kept alive by lzsync. The `target` field
# refers to an existing [[target]] above — all SSH connection details
# (host, user, port, ssh_key) are reused from there. `remote_host` is what
# the far end sees: default "localhost" means "the service runs on the
# target itself". Set `remote_host = "internal"` when the target is a
# bastion jumping to an internal machine.

# [[tunnel]]
# name         = "jupyter"
# target       = "dev"        # references [[target]].name above
# local_port   = 8888
# remote_host  = "localhost"  # default; viewed from the target machine
# remote_port  = 8888
# bind_address = "127.0.0.1"  # default; use "0.0.0.0" to expose on LAN
# autostart    = false        # connect automatically when lzsync launches
